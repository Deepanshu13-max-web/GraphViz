# =====================================================
# RAILWAY PRODUCTION CONFIGURATION - FIXED
# =====================================================

# Server
server.port=${PORT:8080}
#${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
# MySQL Database - Railway Variables (Correct Format)
spring.datasource.url=jdbc:mysql://crossover.proxy.rlwy.net:46117/railway?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=${JWT_SECRET}

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
