# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api
# Spring Boot Configuration
spring.application.name=graph-visualizer
# Database Configuration
spring.datasource.url=mysql://root:vCbqjPUCFGUkFMljYPRUysYcsANiozMm@crossover.proxy.rlwy.net:46117/railway
#localhost:3306/graph_visualizer?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
