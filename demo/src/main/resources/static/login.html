
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Graph Algorithm Visualizer</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-container">
<div class="auth-background">
<div class="floating-graph"></div>
</div>
<div class="auth-card">
<div class="auth-header">
<a href="index.html" class="back-link">← Back to Home</a>
<h1>Welcome Back</h1>
<p>Log in to access your graphs</p>
</div>
<form id="loginForm" class="auth-form">
<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" name="email" required placeholder="Enter your
email">
<span class="focus-border"></span>
</div>
<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" name="password" required
placeholder="Enter your password">
<span class="focus-border"></span>
</div>
<div class="form-options">
<label class="checkbox-container">
<input type="checkbox" id="remember">
<span class="checkmark"></span>
Remember me
</label>
<a href="#" class="forgot-link">Forgot Password?</a>
</div>
<button type="submit" class="btn-primary btn-full" id="loginBtn">
<span>Log In</span>
<div class="loader"></div>
</button>
<p class="auth-footer">
Don't have an account? <a href="signup.html">Sign up</a>
</p>
</form>
</div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
