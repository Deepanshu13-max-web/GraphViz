
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Graph Algorithm Visualizer</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-container">
<div class="auth-background">
<div class="floating-graph"></div>
</div>
<div class="auth-card">
<div class="auth-header">
<a href="index.html" class="back-link">← Back to Home</a>
<h1>Create Account</h1>
<p>Start visualizing graph algorithms today</p>
</div>
<form id="signupForm" class="auth-form">
<div class="form-group">
<label for="name">Full Name</label>
<input type="text" id="name" name="name" required placeholder="Enter your full
name">
<span class="focus-border"></span>
</div>
<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" name="email" required placeholder="Enter your
email">
<span class="focus-border"></span>
</div>
<div class="form-group">
<label for="password">Password</label>
<input type="password" id="password" name="password" required
placeholder="Create a password">
<span class="focus-border"></span>
<div class="password-strength">
<div class="strength-bar"></div>
</div>
</div>
<div class="form-group">
<label for="confirmPassword">Confirm Password</label>
<input type="password" id="confirmPassword" name="confirmPassword" required
placeholder="Confirm your password">
<span class="focus-border"></span>
</div>
<button type="submit" class="btn-primary btn-full" id="signupBtn">
<span>Create Account</span>
<div class="loader"></div>
</button>
<p class="auth-footer">
Already have an account? <a href="login.html">Log in</a>
</p>
</form>
</div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
